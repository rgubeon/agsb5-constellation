<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sky Network Constellation — Airbus</title>
<meta name="ext-resource-dependency" content="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js" />
<style>
  @font-face {
    font-family: 'Inter Tight';
    src: url('assets/Inter Tight-300.ttf') format('truetype');
    font-weight: 300; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Inter Tight';
    src: url('assets/Inter Tight-Regular.ttf') format('truetype');
    font-weight: 400; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Inter Tight';
    src: url('assets/Inter Tight-700.ttf') format('truetype');
    font-weight: 700; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Inter Tight';
    src: url('assets/Inter Tight-Italic.ttf') format('truetype');
    font-weight: 400; font-style: italic; font-display: swap;
  }

  :root {
    --navy: #00205B;
    --white: #FFFFFF;
    --cyan: #00AEC7;
    --steel: #B7C9D3;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Inter Tight', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* Letterbox stage that scales the fixed-size kiosk to fit any viewport */
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000;
  }
  #kiosk {
    position: relative;
    width: 1080px; height: 1920px;
    transform-origin: center center;
    overflow: hidden;
    background: var(--navy);
  }

  ::selection { background: var(--cyan); color: var(--navy); }
</style>
</head>
<body>
  <div id="stage">
    <div id="kiosk"></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>

  <script type="text/babel" src="assets/tweaks-panel.jsx"></script>
  <script type="text/babel" src="assets/app.jsx"></script>
  <script type="text/babel" src="assets/sky-screens.jsx"></script>

  <script>
    // Scale the fixed 1080x1920 kiosk to fit the viewport (letterbox)
    function fitKiosk() {
      const k = document.getElementById('kiosk');
      const s = Math.min(window.innerWidth / 1080, window.innerHeight / 1920);
      k.style.transform = 'scale(' + s + ')';
    }
    window.addEventListener('resize', fitKiosk);
    fitKiosk();
  </script>
</body>
</html>
